<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOOP 오버워치 맞상대 / 팀 편성</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .matchup-shell { display:grid; gap:16px; }
    .simple-head { display:flex; justify-content:space-between; align-items:end; gap:16px; flex-wrap:wrap; }
    .simple-head h1 { margin:0; }
    .simple-head .muted { margin:6px 0 0; }
    .mini-stats { display:flex; gap:10px; flex-wrap:wrap; }
    .mini-stat { min-width:110px; padding:10px 12px; border:1px solid var(--line, #2d3748); border-radius:12px; background:var(--panel, rgba(255,255,255,.04)); }
    .mini-stat .label { font-size:12px; opacity:.7; }
    .mini-stat .value { font-size:20px; font-weight:700; margin-top:4px; }

    .clean-grid { display:grid; grid-template-columns:minmax(320px, 420px) 1fr; gap:16px; align-items:start; }
    .panel-title { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:12px; }
    .panel-title h2, .panel-title h3 { margin:0; }
    .panel-sub { margin:0 0 12px; }

    .pair-create { display:grid; gap:10px; }
    .field label { display:block; margin-bottom:6px; font-size:13px; opacity:.8; }
    .field input { width:100%; }
    .pair-actions, .team-actions, .pool-actions { display:flex; gap:8px; flex-wrap:wrap; }

    .selected-row { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:8px; }
    .picked-name { min-height:48px; display:flex; align-items:center; justify-content:center; padding:10px 12px; border:1px dashed var(--line, #2d3748); border-radius:12px; font-weight:700; }
    .picked-name.is-auto { border-style:solid; }
    .picked-note { font-size:12px; opacity:.7; text-align:center; }

    .stack-layout { display:grid; gap:16px; }
    .pair-pool { border:1px solid var(--line, #2d3748); border-radius:16px; background:var(--panel, rgba(255,255,255,.03)); min-height:160px; padding:14px; }
    .drop-layout { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .team-dropzone { border:1px solid var(--line, #2d3748); border-radius:16px; background:var(--panel, rgba(255,255,255,.03)); min-height:260px; padding:14px; }
    .dropzone-head { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:12px; }
    .dropzone-head h3 { margin:0; }
    .drop-hint { font-size:12px; opacity:.7; }
    .dropzone-body { display:grid; gap:10px; }

    .pool-list { display:grid; gap:10px; }
    .pair-row { display:grid; grid-template-columns:1fr auto 1fr; gap:8px; align-items:center; }
    .pair-link { text-align:center; opacity:.6; font-weight:700; }
    .pair-side, .name-card {
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--line, #2d3748);
      background:rgba(255,255,255,.03);
      cursor:grab;
      user-select:none;
      font-weight:700;
    }
    .pair-side.dragging, .name-card.dragging { opacity:.45; }
    .pair-row.assigned { opacity:.48; }

    .drop-active { outline:2px dashed rgba(99, 179, 237, .9); outline-offset:4px; }
    .empty-drop { padding:18px 12px; border:1px dashed var(--line, #2d3748); border-radius:12px; text-align:center; font-size:13px; opacity:.65; }

    @media (max-width: 980px) {
      .clean-grid, .drop-layout { grid-template-columns:1fr; }
      .selected-row { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap matchup-shell">
    <header class="header simple-head">
      <div class="titlebox">
        <h1>맞상대 / 팀 편성</h1>
        <p class="muted">목록에서 끌어다 팀에 넣는 방식으로 단순화했습니다.</p>
      </div>
      <div class="mini-stats">
        <div class="mini-stat">
          <div class="label">스트리머</div>
          <div class="value" id="streamerCount">0</div>
        </div>
        <div class="mini-stat">
          <div class="label">맞상대</div>
          <div class="value" id="pairCount">0</div>
        </div>
      </div>
    </header>

    <nav class="nav">
      <a href="./index.html">공유 티어보드</a>
      <a href="./tiers.html">포지션별 티어표</a>
      <a class="active" href="./matchup.html">개인 맞상대 / 팀 편성</a>
    </nav>

    <div id="configNotice" class="error hidden"></div>
    <div id="statusBox" class="hidden"></div>

    <section class="clean-grid">
      <section class="panel box">
        <div class="panel-title">
          <h2>맞상대 등록</h2>
        </div>
        <p class="muted small panel-sub">입력 중엔 추천만 보여주고, 입력칸을 벗어나거나 저장할 때 첫 추천으로 자동 선택합니다.</p>

        <div class="pair-create">
          <div class="field autocomplete">
            <label for="rivalAInput">첫 번째 스트리머</label>
            <input id="rivalAInput" autocomplete="off" placeholder="이름 검색" />
            <div id="rivalASuggest" class="suggest hidden"></div>
          </div>
          <div class="field autocomplete">
            <label for="rivalBInput">두 번째 스트리머</label>
            <input id="rivalBInput" autocomplete="off" placeholder="이름 검색" />
            <div id="rivalBSuggest" class="suggest hidden"></div>
          </div>

          <div class="selected-row">
            <div>
              <div class="picked-name" id="pickedAName">선택 전</div>
              <div class="picked-note" id="pickedANote"></div>
            </div>
            <div class="muted">VS</div>
            <div>
              <div class="picked-name" id="pickedBName">선택 전</div>
              <div class="picked-note" id="pickedBNote"></div>
            </div>
          </div>

          <div class="pair-actions">
            <button id="swapPairBtn" type="button" class="secondary">좌우 바꾸기</button>
            <button id="savePairBtn" type="button">저장</button>
            <button id="clearPairsBtn" type="button" class="danger">목록 전체 삭제</button>
          </div>
        </div>
      </section>

      <section class="panel box stack-layout">
        <div>
          <div class="panel-title">
            <div>
              <h2>등록 목록</h2>
              <p class="muted small panel-sub">여기서 이름을 끌어다 A팀 또는 B팀에 놓으면 맞상대는 자동으로 반대 팀으로 들어갑니다.</p>
            </div>
            <div class="pool-actions">
              <button class="secondary" id="shuffleTeamsBtn" type="button">랜덤 셔플</button>
              <button class="danger" id="resetTeamsBtn" type="button">팀 초기화</button>
            </div>
          </div>
          <div class="pair-pool" id="poolZone">
            <div id="poolList" class="pool-list"></div>
          </div>
        </div>

        <div>
          <div class="panel-title">
            <div>
              <h2>팀 편성</h2>
              <p class="muted small panel-sub">팀 안에서는 이름만 보입니다.</p>
            </div>
            <div class="team-actions">
              <button class="secondary" id="size5Btn" type="button">5대5</button>
              <button class="secondary" id="size6Btn" type="button">6대6</button>
            </div>
          </div>

          <div class="drop-layout">
            <div class="team-dropzone" id="teamAZone" data-dropzone="a">
              <div class="dropzone-head">
                <h3>A팀</h3>
                <div id="teamACount">0 / 5</div>
              </div>
              <div id="teamAList" class="dropzone-body"></div>
            </div>
            <div class="team-dropzone" id="teamBZone" data-dropzone="b">
              <div class="dropzone-head">
                <h3>B팀</h3>
                <div id="teamBCount">0 / 5</div>
              </div>
              <div id="teamBList" class="dropzone-body"></div>
            </div>
          </div>
        </div>
      </section>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js"></script>
  <script src="./shared.js"></script>
  <script src="./matchup.js"></script>
</body>
</html>
